[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # Style violations matching PEP8
    "F",   # Logical syntax violations
    "I",   # Systematic import sorting
    "B",   # Structural bug preventions
    "S",   # Security scanning checks
    "C90", # McCabe cyclomatic complexity limit
    "N"    # Consistent variable naming standards
]
ignore = ["E501"] # Avoid line truncation errors on grounded templates

[tool.ruff.lint.per-file-ignores]
"**/tests/*" = ["S101"]

[tool.ruff.lint.mccabe]
max-complexity = 8 # Limit cyclomatic complexity to 8 paths

